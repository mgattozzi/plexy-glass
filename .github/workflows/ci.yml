name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

# A new push to a ref cancels the older run of the same ref. For main this means
# a newer commit supersedes an in-flight test+build+release (latest nightly wins).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      # --no-fail-fast so a red run reports EVERY failure at once (full CI
      # visibility), not just the first — no cost when the suite is green.
      - run: cargo nextest run --workspace --no-fail-fast
      - run: cargo test --workspace --doc

  build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: zig
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: zig
          - target: x86_64-apple-darwin
            os: macos-latest
            cross: apple
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: apple
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - if: matrix.cross == 'zig'
        uses: mlugg/setup-zig@v2
      - if: matrix.cross == 'zig'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild
      - name: Build (musl via zigbuild)
        if: matrix.cross == 'zig'
        run: cargo zigbuild --release --target ${{ matrix.target }} --bin plexy-glass
      - name: Build (apple)
        if: matrix.cross == 'apple'
        run: cargo build --release --target ${{ matrix.target }} --bin plexy-glass
      - name: Stage the binary under its target-triple name
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/plexy-glass" "dist/plexy-glass-${{ matrix.target }}"
      - uses: actions/upload-artifact@v7
        with:
          name: plexy-glass-${{ matrix.target }}
          path: dist/plexy-glass-${{ matrix.target }}
          if-no-files-found: error

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Collect binaries and checksum
        run: |
          mkdir -p dist
          cp artifacts/plexy-glass-* dist/
          chmod +x dist/plexy-glass-*
          (cd dist && sha256sum plexy-glass-* > SHA256SUMS)
      - name: Compute the version string
        id: ver
        run: |
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(git show -s --format=%cs HEAD)" >> "$GITHUB_OUTPUT"
      - name: Move the rolling nightly tag + release
        env:
          GH_TOKEN: ${{ github.token }}
        # Delete the old nightly release AND its tag so the tag re-points to the
        # pushed commit; `|| true` no-ops on the first ever run.
        run: gh release delete nightly --cleanup-tag --yes || true
      - uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          target_commitish: ${{ github.sha }}
          name: nightly
          prerelease: true
          body: |
            Rolling nightly build of `main`.
            Commit ${{ steps.ver.outputs.sha }} · ${{ steps.ver.outputs.date }}
          files: |
            dist/plexy-glass-*
            dist/SHA256SUMS
          fail_on_unmatched_files: true
