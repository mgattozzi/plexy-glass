# nextest configuration.
#
# Most of the suite runs at full parallelism (nextest runs each test in its
# own process, so a `static Mutex` never serializes across tests). Two
# groups carry light caps:
#
# `pty` (daemon unit tests): each spawns a pane or two. Capped to 4 to
# bound the OS-wide PTY table (macOS `kern.tty.ptmx_max` is only 511, hard
# max 999). Measured peak PTY usage stays far under that, so 4 is
# conservative headroom.
#
# `e2e`: each test runs a whole client + daemon + shell + several PTYs and
# drives it step-by-step. Two things make these safe to run wide:
#   - The `TestSession` persistent-reader harness (tests/e2e.rs) polls a
#     shared output buffer instead of sleeping fixed delays, so steps
#     are timing-robust under CPU contention.
#   - `isolate_dirs` sets `TOKIO_WORKER_THREADS=2` in each spawned
#     process's env (inherited by the auto-spawned daemon), so a test's
#     client+daemon start about 4 worker threads instead of ~ncpu each,
#     which keeps the thread count sane when many run at once.
#     Production sets nothing and keeps full per-core threads.
#
# The cap below is measured: with the runtime-dir-scoped `kill` fix (see
# crates/client/src/kill.rs), the full --workspace suite was clean over 9
# consecutive runs at e2e = 4, 8, 12, and 18 (= num-cpus) on an 18-core
# machine, finishing in about 6.5s. Before that fix the suite flaked
# badly above cap 1, NOT from resources, but because `TestEnv::drop` ran
# `plexy-glass kill`, which swept *every* daemon for the user
# (`pgrep -f 'plexy-glass daemon'`) and so killed sibling tests' daemons
# mid-run. `kill` now targets only the current runtime dir's daemon, so
# the tests are isolated.
#
# (`TestSession::start` also retries `openpty` on transient exhaustion,
# and each test kills its own daemon on teardown, so PTYs are freed
# promptly.)

[test-groups]
# Heavyweight: each test is client + daemon + shell + PTYs. `num-cpus` (a
# nextest special value) fans them out to the host's logical-CPU count, so
# it's portable across machines; measured clean at 18 on an 18-core host.
e2e = { max-threads = "num-cpus" }
# Daemon unit tests spawn a pane or two each.
pty = { max-threads = 4 }

[[profile.default.overrides]]
filter = 'binary(e2e)'
test-group = 'e2e'

[[profile.default.overrides]]
filter = 'package(plexy-glass-daemon)'
test-group = 'pty'
